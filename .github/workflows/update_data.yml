name: Update Stock Data Cache

on:
  # 每天台灣時間下午 2:30（UTC 06:30）收盤後自動執行
  schedule:
    - cron: '30 6 * * 1-5'   # 週一至週五（跳過週末）

  # 允許手動觸發
  workflow_dispatch:
    inputs:
      stocks:
        description: '股票代碼（空格分隔，留空則更新預設清單）'
        required: false
        default: ''

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要 write 權限才能 commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --only-binary=:all: yfinance pandas numpy requests 2>/dev/null || \
          pip install yfinance pandas numpy requests

      - name: Fetch and cache stock data
        working-directory: tw_stock_screener
        run: |
          if [ -n "${{ github.event.inputs.stocks }}" ]; then
            python fetch_and_cache.py ${{ github.event.inputs.stocks }}
          else
            python fetch_and_cache.py 2330 2317 2454 2308 2412 3008 0050 0056
          fi

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tw_stock_screener/data/*.csv
          if git diff --cached --quiet; then
            echo "No changes to commit (data up to date)"
          else
            DATE=$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')
            git commit -m "chore: auto-update stock data cache [${DATE} TST]"
            git push
            echo "✅ Data cache committed and pushed"
          fi
